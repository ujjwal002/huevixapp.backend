<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Huevix · Admin Metrics</title>
<script src="/admin/chart.umd.min.js" defer></script>
<style>
  :root{--bg:#0f0d1d;--panel:#171430;--line:#2a2550;--text:#eceaf7;--dim:#9a94c2;--purple:#8b5cf6;--green:#34d399;--red:#f87171;--amber:#fbbf24}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 18px 60px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px}
  .mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:grid;place-items:center;font-weight:800}
  .muted{color:var(--dim);font-size:12.5px}
  button{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:0;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--dim)}
  /* login */
  .login{max-width:380px;margin:12vh auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px}
  .login h1{font-size:20px;margin-bottom:6px}
  .login p{color:var(--dim);font-size:13.5px;margin-bottom:18px}
  .login input{width:100%;background:#100e22;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:12px 14px;font-size:14.5px;margin-bottom:12px}
  .err{color:var(--red);font-size:13px;margin-top:10px;min-height:16px}
  /* stat grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:22px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .stat .v{font-size:24px;font-weight:800;margin-top:2px}
  .stat .l{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.6px}
  .stat .s{color:var(--dim);font-size:12px;margin-top:4px}
  .good{color:var(--green)} .bad{color:var(--red)} .warn{color:var(--amber)}
  h2{font-size:15px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin:26px 0 12px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  canvas{max-height:240px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  td,th{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--dim);font-weight:600;font-size:12px;text-transform:uppercase}
  .na{color:var(--dim);font-style:italic}
  @media(max-width:800px){.two{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <!-- LOGIN -->
  <div id="login" class="login" style="display:none">
    <h1>Huevix Admin</h1>
    <p>Sign in with your admin account to view metrics.</p>
    <input id="email" type="email" placeholder="admin email" autocomplete="username" />
    <input id="password" type="password" placeholder="password" autocomplete="current-password" />
    <button style="width:100%" id="btnLogin">Sign in</button>
    <div id="loginErr" class="err"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" style="display:none">
    <header>
      <div class="brand"><span class="mark">H</span> Huevix Metrics</div>
      <div style="display:flex;gap:10px;align-items:center">
        <span id="stamp" class="muted"></span>
        <button class="ghost" id="btnRefresh">Refresh</button>
        <button class="ghost" id="btnLogout">Log out</button>
      </div>
    </header>
    <div id="content"><p class="muted">Loading…</p></div>
  </div>
</div>

<script src="/admin/dashboard.js" defer></script>

</body>
</html>
