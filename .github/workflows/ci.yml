name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: huevix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/huevix_test
      NODE_ENV: test
      # Deterministic test secrets (>=32 chars to satisfy the prod-style checks)
      JWT_ACCESS_SECRET: test_access_secret_that_is_long_enough_1234
      JWT_REFRESH_SECRET: test_refresh_secret_that_is_long_enough_123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (blocking)
        run: npm audit --omit=dev --audit-level=high

      - name: Audit all dependencies (report only)
        run: npm audit || true

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations to the test database
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Tests
        run: npm test